apiVersion: batch/v1
kind: Job
metadata:
  name: init-paperless-db
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    # helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    spec:
      containers:
      - name: db-init
        image: docker.io/library/postgres:15-alpine
        envFrom:
          - secretRef:
              name: paperlesssecret
        command:
          - /bin/sh
          - -c
          - |
            # Use the existing Postgres user and password from paperlesssecret
            export PGPASSWORD=$PAPERLESS_DBPASS
            
            # Check if paperless-db exists; if not, create it
            psql -h postgres -U $PAPERLESS_DBUSER -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'paperless-db'" | grep -q 1 || psql -h postgres -U $PAPERLESS_DBUSER -d postgres -c "CREATE DATABASE \"paperless-db\" OWNER $PAPERLESS_DBUSER"
            
            echo "Database initialization complete."
      restartPolicy: OnFailure
