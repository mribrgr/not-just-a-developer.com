apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless
  template:
    metadata:
      labels:
        app: paperless
    spec:
      containers:
        - name: paperless
          image: ghcr.io/paperless-ngx/paperless-ngx:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: paperlesssecret
          env:
            - name: PAPERLESS_URL
              value: https://paperless.mauritiusberger.de
            - name: USERMAP_UID
              value: "1000"
            - name: USERMAP_GID
              value: "1000"
            - name: PAPERLESS_PORT
              value: "8000"
            - name: PAPERLESS_APPS
              value: 'allauth.socialaccount.providers.openid_connect'
            - name: PAPERLESS_SOCIALACCOUNT_AUTO_SIGNUP
              value: "true"
            - name: PAPERLESS_REMOTE_USER_HEADER_NAME
              value: "HTTP_REMOTE_USER"
            - name: PAPERLESS_REDIRECT_LOGIN_TO_SSO
              value: "true"
            - name: "PAPERLESS_DISABLE_REGULAR_LOGIN"
              value: "false"  # in the future to true
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
            - name: export
              mountPath: /usr/src/paperless/export
            - name: consume
              mountPath: /usr/src/paperless/consume
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data-pvc
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media-pvc
        - name: export
          persistentVolumeClaim:
            claimName: paperless-export-pvc
        - name: consume
          persistentVolumeClaim:
            claimName: paperless-consume-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-web
spec:
  selector:
    app: paperless
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000